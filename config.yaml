topics:
  critical:
    score_range: [8, 10]
    keywords:
      - AI foundation model releases
      - major geopolitical events (UK, US)
      - breaking news with wide impact
      - major UK/US policy changes
      - AI agents and agent frameworks
      - major funding rounds (>$50M)

  high:
    score_range: [6, 8]
    keywords:
      - AI research breakthroughs / product launches
      - UK government / parliament news
      - US politics and policy
      - London city news and transport
      - major business/funding news
      - AI regulation and policy
      - open source model releases

  moderate:
    score_range: [4, 6]
    keywords:
      - general AI/ML papers and tools
      - UK/US economic data
      - sports, culture, environment
      - startup news
      - developer tools

scoring:
  model: claude-sonnet-4-5-20250929
  min_score: 3.0

digest:
  model: claude-sonnet-4-5-20250929
  max_stories: 150

world_news_podcast:
  model: claude-sonnet-4-5-20250929
  max_stories: 150
  min_score: 3.0
  topics:
    critical:
      score_range: [8, 10]
      keywords:
        - major US political events and policy changes
        - breaking international news with wide impact
        - military conflicts and escalations
        - major diplomatic developments
        - US Supreme Court decisions
    high:
      score_range: [6, 8]
      keywords:
        - US Congress and legislation
        - international trade and sanctions
        - global health emergencies
        - major elections worldwide
        - US economic policy and indicators
        - humanitarian crises
        - climate and environment policy
    moderate:
      score_range: [4, 6]
      keywords:
        - regional conflicts and politics
        - US state-level news
        - international business
        - global culture and society
        - immigration and border policy

tts:
  model: tts-1-hd
  voice: nova

