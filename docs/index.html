<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Podcast</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    max-width: 480px;
    width: 100%;
    padding: 40px 32px;
    text-align: center;
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 24px; color: #1a1a1a; margin-bottom: 8px; }
  .date { font-size: 14px; color: #888; margin-bottom: 32px; }
  audio {
    width: 100%;
    margin-bottom: 24px;
    border-radius: 8px;
  }
  .download {
    display: inline-block;
    font-size: 14px;
    color: #0066cc;
    text-decoration: none;
  }
  .download:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#127911;</div>
  <h1>Daily Podcast</h1>
  <div class="date" id="date"></div>
  <audio controls autoplay preload="auto"
    src="https://github.com/powder8/dailyPodcast/releases/download/latest/podcast.mp3">
    Your browser does not support the audio element.
  </audio>
  <a class="download"
    href="https://github.com/powder8/dailyPodcast/releases/download/latest/podcast.mp3"
    download>Download MP3</a>
</div>
<script>
  document.getElementById('date').textContent =
    new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
</script>
</body>
</html>
